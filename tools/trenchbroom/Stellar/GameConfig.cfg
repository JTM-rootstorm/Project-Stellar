// Stellar TrenchBroom game configuration.
// Install repo-local from this directory or copy/link it into TrenchBroom's games directory.
// Copied packages resolve the repository at compile time through STELLAR_REPO_ROOT or .stellar_repo_root.
{
    "version": 9,
    "name": "Stellar",
    "icon": "Icon.png",
    "fileformats": [
        { "format": "Standard", "initialmap": "templates/minimal_zup_room.map" },
        { "format": "Valve", "initialmap": "templates/minimal_zup_room.map" }
    ],
    "filesystem": {
        "searchpath": ".",
        "packageformat": { "extension": "wad", "format": "idwad" }
    },
    "materials": {
        "root": "materials",
        "extensions": [".wad", "wad", ".png", "png", ".jpg", "jpg", ".jpeg", "jpeg", ".tga", "tga"]
    },
    "entities": {
        "definitions": [ "stellar_entities.fgd" ],
        "defaultcolor": "0.6 0.8 1.0 1.0"
    },
    "tags": {
        "brush": [],
        "brushface": []
    },
    "compilationTools": [
        { "name": "Stellar BSP30 compile wrapper", "path": "bin/stellar_tb_compile.sh" },
        { "name": "Stellar BSP30 validation wrapper", "path": "bin/stellar_tb_validate.sh" }
    ],
    "mapsource": "../../../maps/src",
    "mapoutput": "../../../maps/compiled"
}
