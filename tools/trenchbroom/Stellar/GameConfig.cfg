// Stellar TrenchBroom game configuration.
// Install by adding this directory as a TrenchBroom game package or by copying
// tools/trenchbroom/Stellar into TrenchBroom's games directory.
{
    "version": 9,
    "name": "Stellar",
    "icon": "Icon.png",
    "fileformats": [
        { "format": "Standard", "initialmap": "" },
        { "format": "Valve", "initialmap": "" }
    ],
    "filesystem": {
        "searchpath": "../../..",
        "packageformat": { "extension": "wad", "format": "idwad" }
    },
    "textures": {
        "root": "tools/trenchbroom/Stellar/materials",
        "extensions": ["wad", "png", "jpg", "jpeg", "tga"]
    },
    "entities": {
        "definitions": [ "stellar_entities.fgd" ],
        "defaultcolor": "0.6 0.8 1.0 1.0"
    },
    "tags": {
        "brush": [],
        "brushface": []
    },
    "compilationTools": [
        { "name": "Stellar BSP30 compile wrapper", "path": "../../../tools/bsp/compile_trenchbroom_bsp30.sh" },
        { "name": "Stellar BSP30 validation wrapper", "path": "../../../tools/bsp/validate_trenchbroom_bsp30.sh" }
    ],
    "mapsource": "../../../maps/src",
    "mapoutput": "../../../maps/compiled"
}
